<script>
'use strict';
const $=id=>document.getElementById(id),ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1)),pick=a=>a[Math.floor(Math.random()*a.length)],shuffle=a=>a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(p=>p[1]),r2=n=>Math.round((n+Number.EPSILON)*100)/100,money=n=>(n<0?'−£':'£')+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const Store={get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}},del(k){try{localStorage.removeItem(k)}catch(e){}}};
const SAVE='billsBuffersSave_v1',REC_KEY='poundsPitfallsRecords_v4';
const MONTHS=[{em:'🏠',name:'Month 1: Getting Started',sub:'Rent, bills and first budget choices.',events:2},{em:'⚡',name:'Month 2: Bills and Surprises',sub:'Meter readings, subscriptions and rising costs.',events:3},{em:'📈',name:'Month 3: Future Planning',sub:'Interest, VAT, depreciation and trickier choices.',events:3}];
const STAGE={1:'Payslip',2:'Budget',3:'Events',4:'Bank',5:'Report',6:'Final'};
const ENDINGS=[
{id:'perfect',em:'🏆',name:'The Perfect Planner',pass:true,test:s=>s.targetsMet===3&&acc()>=85&&s.balance>=500&&s.bestStreak>=4,txt:'Three strong months, accurate maths and cash in reserve. Henry can lower the clipboard.'},
{id:'secure',em:'🏦',name:'The Emergency Saver',pass:true,test:s=>s.safe>=80&&s.balance>=300,txt:'You built a serious buffer. Future-you is applauding politely.'},
{id:'percent',em:'📈',name:'The Percentage Expert',pass:true,test:s=>topicAcc('Percentage')>=85&&s.correct>=8,txt:'VAT, discounts, interest and depreciation met a student with a multiplier.'},
{id:'bank',em:'💳',name:'The Bank Statement Expert',pass:true,test:s=>s.bankChecks>=3&&s.balance>=0,txt:'Credit, debit, balance, overdrawn — all under control.'},
{id:'luxury',em:'🍾',name:'The Lifestyle Legend',pass:true,test:s=>s.life>=85&&s.balance>=0,txt:'You lived well and somehow did not bankrupt yourself.'},
{id:'goblin',em:'🐉',name:'The Super Saver',pass:true,test:s=>s.balance>=700&&s.life<60,txt:'Huge savings, tiny joy. Financially sensible, spiritually beige.'},
{id:'crisis',em:'🚨',name:'Budget Crisis Survivor',pass:false,test:s=>true,txt:'Not every month was pretty, but you found several traps before adult life could weaponise them.'}
];
let REC=Store.get(REC_KEY)||{plays:0,bestScore:0,bestBalance:-9999,longestStreak:0,endings:[]},S=null,Q=null,ans='',toastT=null;
function newGame(name){let s={name,month:1,stage:1,balance:100,life:50,safe:45,stress:35,selected:{},priced:{},ledger:[],events:[],eventIndex:0,legend:false,monthLogs:[],total:0,correct:0,stats:{},monthQ:0,monthFirst:0,streak:0,bestStreak:0,targetsMet:0,bankChecks:0,seenQuestions:[],log:[]};setupMonth(s,1);return s}
function setupMonth(s,m){s.month=m;s.stage=1;s.profile=profile(m);s.pay={gross:false,tax:false,net:false,opened:false};s.selected={};s.priced={};s.cards=cards(s.profile,m);s.ledger=[{desc:'Opening balance',amount:s.balance}];s.events=events(m);s.eventIndex=0;s.legend=false;s.monthQ=0;s.monthFirst=0}
function profile(m){let j=pick([['Retail assistant',112,10.60,9,15.90,12],['Cafe shift lead',118,10.95,7,16.43,12],['Leisure centre assistant',105,11.20,12,16.80,10],['Warehouse picker',116,11.05,8,16.58,15],['Cinema supervisor',110,10.80,10,16.20,12]]);let [job,hours,rate,ot,otr,taxRate]=j;if(m===2){hours+=ri(2,8);ot+=ri(1,3)}if(m===3){rate=r2(rate+.35);taxRate=pick([12,15,18])}let normal=r2(hours*rate),over=r2(ot*otr),gross=r2(normal+over),tax=r2(gross*taxRate/100),net=r2(gross-tax);return{job,hours,rate,ot,otr,taxRate,normal,over,gross,tax,net}}
function mk(cat,id,e,t,tag,cost,life,safe,stress,q,a,topic,note){return{cat,id,e,t,tag,cost:r2(cost),life,safe,stress,q,a:r2(a),topic,note}}
function cards(p,m){
let prev=ri(1400,1700),units=ri(85+m*12,135+m*15),now=prev+units,rate=r2(.24+m*.03),standing=r2(12.5+m*1.5),meter=r2(units*rate+standing);
let foodPre=210+m*10,foodVoucher=5+5*m,foodDeal=r2(foodPre*.8-foodVoucher),bus=74+m*2,save8=r2(p.net*.08);
let cancelEach=r2(6.99+m*1.25),cancelTotal=r2(cancelEach*2);
let stream=r2(8.99+m*.5),music=r2(5.99+m*.4),storage=r2(2.49+m*.25),basicSub=r2(stream+music+storage);
let essential=560+m*70,emergency=r2(essential*3);
return{
housing:[mk('housing','box','📦','Box room','Core',440+m*15,-7,7,5,`Rent is ${money(440+m*15)}. Take-home pay is ${money(p.net)}. How much remains after rent?`,r2(p.net-(440+m*15)),'Budgeting','Cheap. May include cupboard-based living.'),mk('housing','share','🏘️','Standard flatshare','Standard',580+m*20,8,4,0,`Rent is ${money(580+m*20)}. What percentage of take-home pay ${money(p.net)} is this? Give the nearest whole percent.`,Math.round((580+m*20)/p.net*100),'Percentage of an amount','Sensible flatshare. Grimly realistic.'),mk('housing','studio','🏙️','Studio flat','Premium',780+m*25,18,-8,14,`A studio costs ${money(780+m*25)}. Is this more than 60% of take-home pay? Type 1 for yes or 0 for no.`,(780+m*25)>p.net*.6?1:0,'Percentage comparison','Lovely privacy. Financially spicy.')],
bills:[mk('bills','meter','🔢','Meter reading bill','Meter',meter,3,6,0,`Electric meter reading changed from ${prev} to ${now}. Units cost ${money(rate)} each, plus standing charge ${money(standing)}. What is the total bill?`,meter,'Utility bills: meter readings','Meter readings: where decimals go to breed.'),mk('bills','standard','🔌','Standard bills','Standard',135+m*8,4,5,0,`Electricity £48.60, water £22.40, phone £18.99, internet ${money(r2(135+m*8-48.60-22.40-18.99))}. What is the total?`,135+m*8,'Adding decimal money','A boring but plausible bills setup.'),mk('bills','warm','🔥','Warm home','Comfort',170+m*10,9,7,-3,`Last month\'s bill was ${money(r2((170+m*10)/1.12))}. It increased by 12%. What is the new bill?`,170+m*10,'Increasing by a percentage','Warmth: apparently now premium content.')],
food:[mk('food','cheap','🥫','Ultra-budget shop','Core',128+m*8,-11,1,10,`You spend ${money(r2((128+m*8)/4))} per week for 4 weeks. What is the monthly cost?`,128+m*8,'Multiplying decimals','You survive. Joy may not.'),mk('food','sensible','🥗','Sensible shop','Standard',185+m*10,6,3,0,`A weekly shop costs ${money(r2((185+m*10)/4))}. What is the cost for 4 weeks?`,185+m*10,'Multiplying decimals','Practical and not entirely miserable.'),mk('food','deals','🏷️','Deal-hunter shop','Deal',foodDeal,9,5,-4,`A ${money(foodPre)} food plan has 20% off, then a ${money(foodVoucher)} voucher. What is the final cost?`,foodDeal,'Percentage decrease and vouchers','Requires maths. Rewards smugness.')],
transport:[mk('transport','bike','🚲','Walk / cycle','Cheap',22+m*3,-4,3,4,`Bike maintenance costs ${money(r2((22+m*3)/4))} per week for 4 weeks. What is the monthly cost?`,22+m*3,'Multiplying decimals','Cheap, healthy, wet.'),mk('transport','bus','🚌','Bus pass','Reliable',bus,5,6,0,`A bus pass costs ${money(bus)}. Pay-as-you-go is £4.60 per day. From how many whole days is the pass better value?`,Math.floor(bus/4.6)+1,'Budgeting: break-even','Reliable. Not glamorous. Works.'),mk('transport','train','🚆','Train pass','Fast',145+m*8,10,4,5,`A train pass costs ${money(145+m*8)}. A bus pass costs ${money(bus)}. How much more is the train pass?`,r2(145+m*8-bus),'Subtracting decimal money','Fast. Wallet-hostile.')],
subs:[mk('subs','none','🚫','No subscriptions','Frugal',0,-8,8,-3,`You cancel 2 subscriptions costing ${money(cancelEach)} each per month. How much do you save each month?`,cancelTotal,'Multiplying decimal money','Free entertainment: staring into space.'),mk('subs','basic','🎧','Basic entertainment','Small',basicSub,4,0,0,`Streaming ${money(stream)}, music ${money(music)}, storage ${money(storage)}. What is the total?`,basicSub,'Adding decimal money','A manageable drip-drip of money.'),mk('subs','chaos','🤯','Subscription chaos','Trap',76+m*5,16,-12,13,`Four subscriptions cost ${money(r2((76+m*5)/4))} each. What is the total?`,76+m*5,'Multiplying decimals','Tiny costs. Big ambush.')],
savings:[mk('savings','zero','🕳️','No emergency fund','Risky',0,4,-18,16,`A sensible emergency fund is 3 months of essential costs. Your essential costs are ${money(essential)} per month. What emergency fund would be recommended?`,emergency,'Budgeting: emergency fund','More spending money now, but no cushion if something goes wrong.'),mk('savings','fifty','🐖','Save £50','Starter',50,0,8,-4,`You save £50 from ${money(p.net)}. How much remains before other spending?`,r2(p.net-50),'Subtracting decimal money','A small cushion.'),mk('savings','eight','📈','Save 8%','Percent',save8,-5,20,-10,`You save 8% of ${money(p.net)}. How much do you save?`,save8,'Percentage of an amount','Percentage-powered responsibility.')]
}}
function events(m){return shuffle([evMeter(m),evVAT(),evBank(),evRepair(m),evOvertime(),evVoucher(),evDepreciation(),evReverse()]).slice(0,MONTHS[m-1].events)}

function askGross(){let p=S.profile;ask({level:'Standard',topic:'Wages and overtime',text:`You work ${p.hours} hours at ${money(p.rate)} per hour and ${p.ot} overtime hours at ${money(p.otr)} per hour. What is your gross monthly pay?`,answer:p.gross,hint:'Normal pay plus overtime pay.',done(){S.pay.gross=true;render()}})}

function askNet(){let p=S.profile;ask({level:'Core',topic:'Subtracting decimal money',text:`Gross pay is ${money(p.gross)} and deductions are ${money(p.tax)}. What is take-home pay?`,answer:p.net,hint:'Gross pay − deductions.',done(){S.pay.net=true;render()}})}
function handleEvent(ev,i){
 let c=ev&&ev.choices?ev.choices[i]:null;
 if(!c){
   toast('This event could not be read. Starting a fresh event safely.');
   S.events=events(S.month);
   S.eventIndex=0;
   render();
   return;
 }
 try{
   if(typeof c.q==='function'){
     ask(c.q());
     return;
   }
   if(typeof c.apply==='function'){
     c.apply();
     return;
   }
   toast('This saved event is stale. Refreshing the event.');
   S.events=events(S.month);
   S.eventIndex=0;
   render();
 }catch(err){
   console.error(err);
   toast('That event misfired. Refreshing safely.');
   S.events=events(S.month);
   S.eventIndex=0;
   render();
 }
}
function nextEvent(){S.eventIndex++;render()}
function addLedger(desc,amount){S.ledger.push({desc,amount:r2(amount)})}
function askBank(){let bal=r2(S.ledger.reduce((s,x)=>s+x.amount,0));ask({level:'Tricky',topic:'Bank statements',text:'Using the bank statement table, what is the final balance?',answer:bal,hint:'Add credits and subtract debits. Negative means overdrawn.',done(){S.bankChecks++;S.balance=bal;closeMonth();render()}})}
function closeMonth(){let target=S.balance>=0&&S.life>=55&&S.safe>=50&&S.stress<70&&monthAcc()>=70;if(target)S.targetsMet++;S.monthLogs.push({balance:S.balance,life:S.life,safe:S.safe,stress:S.stress,q:S.monthQ,first:S.monthFirst,acc:monthAcc(),target});S.stage=5}

function evMeter(m){let prev=ri(2100,2600),units=ri(90+m*12,160+m*15),now=prev+units,rate=r2(.22+m*.03),standing=r2(12.5+m*1.5),bill=r2(units*rate+standing);return{e:'🔢',t:'Meter reading shock',text:'A utility bill arrives. Meter readings decide the damage.',choices:[{label:'Calculate the bill',good:true,q(){return qEvent('Standard','Utility bills: meter readings',`Meter reading changed from ${prev} to ${now}. Units cost ${money(rate)} each, plus standing charge ${money(standing)}. What is the total bill?`,bill,'Units used = new − old. Then units × rate + standing charge.',()=>{S.balance=r2(S.balance-bill);addLedger('Meter reading bill',-bill);S.stress=clamp(S.stress+3,0,100);nextEvent()})}},{label:'Pay rough estimate',good:false,apply(){let over=r2(bill+25);S.balance=r2(S.balance-over);addLedger('Overestimated utility bill',-over);S.stress=clamp(S.stress+8,0,100);nextEvent()}}]}}
function evVAT(){
 let net=pick([45,65,85,120]),total=r2(net*1.2);

  {label:'Calculate VAT total',good:true,q(){
    return qEvent('Tricky','VAT',`A service costs ${money(net)} before VAT. VAT is 20%. What is the total including VAT?`,total,'Multiply by 1.2.',()=>{

  {label:'Assume quote is final',good:false,apply(){

  }}
 ]};
}
function evBank(){

return{e:'💳',t:'Bank statement error',text:'A statement looks wrong. Spotting it recovers money.',lucky:true,choices:[{label:'Audit statement',good:true,q(){return qEvent('Tricky','Bank statements',`A statement shows: start ${money(start)}, credit ${money(credit)}, debit ${money(debit)}. What should the final balance be?`,final,'Start + credit − debit.',()=>{S.balance=r2(S.balance+35);addLedger('Bank error recovered',35);S.safe=clamp(S.safe+4,0,100);nextEvent()})}},{label:'Ignore it',good:false,apply(){S.stress=clamp(S.stress+10,0,100);nextEvent()}}]}}
function evRepair(m){let cost=pick([55,60,75])+m*5,rate=pick([20,25]),disc=r2(cost*(1-rate/100));return{e:'🛠️',t:'Unexpected repair',text:'Something breaks. A discount may help.',choices:[{label:'Pay full repair',good:false,apply(){S.balance=r2(S.balance-cost);addLedger('Repair',-cost);S.stress=clamp(S.stress+8,0,100);nextEvent()}},{label:'Use discount maths',good:true,q(){return qEvent('Standard','Percentage decrease',`A repair costs ${money(cost)} but you find a ${rate}% discount. What is the discounted price?`,disc,'Use a decrease multiplier.',()=>{S.balance=r2(S.balance-disc);addLedger('Discounted repair',-disc);S.stress=clamp(S.stress+3,0,100);nextEvent()})}}]}}

function evVoucher(){let shop=pick([48.60,62.40,74.80]),rate=pick([10,15,20]),save=r2(shop*rate/100);return{e:'🛒',t:'Supermarket voucher',text:'Percentage skills decide the saving.',lucky:true,choices:[{label:'Use voucher',good:true,q(){return qEvent('Standard','Percentage decrease',`A food shop of ${money(shop)} has ${rate}% off. How much do you save?`,save,'Find the percentage of the shop.',()=>{S.balance=r2(S.balance+save);addLedger('Voucher saving',save);nextEvent()})}},{label:'Forget voucher',good:false,apply(){nextEvent()}}]}}
function evDepreciation(){
let value=pick([300,400,500,650]),rate=pick([15,20,25]),worth=r2(value*(1-rate/100));
return{e:'📉',t:'Depreciation decision',text:'A phone upgrade offer appears.',choices:[{label:'Check depreciation',good:true,q(){return qEvent('Mega','Depreciation / repeated percentage change',`A phone worth ${money(value)} depreciates by ${rate}% in one year. What is it worth after depreciation?`,worth,`${rate}% decrease means multiply by ${r2(1-rate/100)}.`,()=>{S.safe=clamp(S.safe+8,0,100);nextEvent()})}},{label:'Upgrade on vibes',good:false,apply(){S.balance=r2(S.balance-60);addLedger('Phone upgrade deposit',-60);S.life=clamp(S.life+6,0,100);S.stress=clamp(S.stress+8,0,100);nextEvent()}}]}}

function challenge(boss){

ask(pick(pool))}
function ask(q){S.seenQuestions=S.seenQuestions||[];let key=String(q.text).replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();let repeat=S.seenQuestions.includes(key);if(!repeat)S.seenQuestions.push(key);Q={...q,counted:false};ans='';$('qLevel').textContent=q.level||'Question';$('qTopic').textContent='Topic: '+q.topic+(repeat?' · repeat check':'');$('qText').innerHTML=q.text;$('qHtml').innerHTML=q.html||'';$('qFmt').textContent=q.fmt||'Give an amount to 2 decimal places unless told otherwise.';$('fb').textContent='';$('fb').className='fb';$('hint').classList.add('hidden');$('hint').textContent=q.hint||'';renderAns();renderKeypad();$('qBack').onclick=closeQ;$('overlay').classList.remove('hidden')}
function renderAns(){let a=$('ans');if(ans){a.textContent=ans;a.classList.remove('empty')}else{a.textContent='type your answer';a.classList.add('empty')}}
function renderKeypad(){let keys=['7','8','9','⌫','4','5','6','−','1','2','3','.','0','00','C','Enter'];$('keypad').innerHTML=keys.map(k=>`<button class="${k==='Enter'?'enter':(k==='⌫'||k==='C'?'del':'')}" data-k="${k}">${k}</button>`).join('');document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>press(b.dataset.k))}
function press(k){if(k==='Enter')return submit();if(k==='C')ans='';else if(k==='⌫')ans=ans.slice(0,-1);else if(k==='−')ans=ans.startsWith('-')?ans.slice(1):('-'+ans);else if(k==='.'&&ans.includes('.')){}else if(ans.length<12)ans+=k;renderAns()}
function submit(){let v=Number(String(ans).replace(/[£,%\s,]/g,'').replace('−','-'));if(!Number.isFinite(v)){bad('Type a number first.');return}if(!Q.counted){Q.counted=true;S.total++;S.monthQ++;S.stats[Q.topic]=S.stats[Q.topic]||{a:0,c:0};S.stats[Q.topic].a++}if(Math.abs(v-Q.answer)<.011){S.correct++;S.monthFirst++;S.stats[Q.topic].c++;S.streak++;S.bestStreak=Math.max(S.bestStreak,S.streak);good('Correct.');setTimeout(()=>{let fn=Q.done;closeQ();fn&&fn()},350)}else{S.streak=0;bad('Not quite.');if(Q.hint){$('hint').classList.remove('hidden')}}hud();save()}
function good(m){$('fb').textContent=m;$('fb').className='fb good'}function bad(m){$('fb').textContent=m;$('fb').className='fb bad'}function closeQ(){$('overlay').classList.add('hidden');Q=null;ans=''}
function sign(n){return n>0?'+'+n:String(n)}function addLog(t){S.log.push(t)}function save(){if(S&&S.stage!==6)Store.set(SAVE,S)}function acc(){return S.total?Math.round(S.correct/S.total*100):100}function monthAcc(){return S.monthQ?Math.round(S.monthFirst/S.monthQ*100):100}function topicAcc(f){let rows=Object.entries(S.stats).filter(([k])=>k.includes(f)),a=rows.reduce((s,[,v])=>s+v.a,0),c=rows.reduce((s,[,v])=>s+v.c,0);return a?Math.round(c/a*100):0}
function summary(log){let x=log||S;return`<div class="report"><div class="row"><span>💰 Balance</span><b class="${x.balance>=0?'plus':'minus'}">${money(x.balance)}</b></div><div class="row"><span>🙂 Life</span><b>${x.life}</b></div><div class="row"><span>🛡️ Security</span><b>${x.safe}</b></div><div class="row"><span>😵 Stress</span><b>${x.stress}</b></div><div class="row"><span>🎯 Accuracy</span><b>${log?log.acc:acc()}%</b></div><div class="row"><span>⚡ Best streak</span><b>${S.bestStreak}</b></div></div>`}
function topicRows(){return Object.entries(S.stats).sort((a,b)=>a[0].localeCompare(b[0])).map(([t,st])=>{let pc=st.a?Math.round(st.c/st.a*100):0;return`<div class="accrow"><span>${esc(t)}</span><div class="bar"><i style="width:${pc}%"></i></div><span>${pc}%</span></div>`}).join('')}
function calcScore(){return Math.max(0,Math.round(400+clamp(S.balance/2,-150,250)+S.life*2+S.safe*2-S.stress*2+acc()*2+S.targetsMet*60+S.bestStreak*8))}
function getEnding(){return ENDINGS.find(e=>e.test(S))}function record(e){REC.plays++;REC.bestScore=Math.max(REC.bestScore,S.score);REC.bestBalance=Math.max(REC.bestBalance,S.balance);REC.longestStreak=Math.max(REC.longestStreak,S.bestStreak);REC.lastNew=false;if(!REC.endings.includes(e.id)){REC.endings.push(e.id);REC.lastNew=true}Store.set(REC_KEY,REC)}
function toast(m){$('toastMsg').textContent=m;$('toastWrap').classList.remove('hidden');clearTimeout(toastT);toastT=setTimeout(()=>$('toastWrap').classList.add('hidden'),1800)}
document.addEventListener('keydown',e=>{if($('overlay').classList.contains('hidden'))return;if(/^[0-9.]$/.test(e.key)){press(e.key);e.preventDefault()}if(e.key==='Backspace'){press('⌫');e.preventDefault()}if(e.key==='Enter'){press('Enter');e.preventDefault()}if(e.key==='-'||e.key==='−'){press('−');e.preventDefault()}});
setInterval(()=>{if(S){S.life=clamp(Math.round(S.life),0,100);S.safe=clamp(Math.round(S.safe),0,100);S.stress=clamp(Math.round(S.stress),0,100);hud()}},500);render();
</script>
